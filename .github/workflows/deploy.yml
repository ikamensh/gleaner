name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run tests
        shell: bash
        run: |
          uv run \
            --with pytest --with httpx \
            --with fastapi --with uvicorn \
            --with google-auth --with google-cloud-firestore --with google-cloud-storage \
            --with piicleaner --with detect-secrets \
            --with pyarrow \
            pytest tests/ -v
        env:
          GLEANER_MOCK: "1"

  deploy:
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/430011644943/locations/global/workloadIdentityPools/github/providers/github-actions
          service_account: github-deploy@covenance-469421.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy gleaner \
            --source=. \
            --project=covenance-469421 \
            --region=europe-west1 \
            --allow-unauthenticated \
            --memory=256Mi \
            --min-instances=0 \
            --max-instances=3
